<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lica — Mental Health Assistant</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f0eeff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 16px;
  }

  .app {
    width: 100%;
    max-width: 700px;
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 4px 24px rgba(83, 74, 183, 0.10), 0 1px 4px rgba(83,74,183,0.06);
    display: flex;
    flex-direction: column;
    height: 90vh;
    max-height: 820px;
    overflow: hidden;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 13px;
    padding: 18px 22px;
    border-bottom: 1px solid #f0eeff;
    background: #fff;
    flex-shrink: 0;
  }

  .hav {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: #534AB7;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .hav svg { width: 24px; height: 24px; }

  .hinfo { flex: 1; }

  .hname {
    font-size: 16px;
    font-weight: 600;
    color: #1a1825;
    letter-spacing: -0.2px;
  }

  .hstatus {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: #6b7080;
    margin-top: 2px;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #1D9E75;
    flex-shrink: 0;
  }

  .hbadge {
    font-size: 11px;
    font-weight: 500;
    background: #EEEDFE;
    color: #3C3489;
    padding: 5px 12px;
    border-radius: 20px;
  }

  #chat-history {
    flex: 1;
    overflow-y: auto;
    padding: 20px 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: #faf9ff;
    scroll-behavior: smooth;
  }

  #chat-history::-webkit-scrollbar { width: 4px; }
  #chat-history::-webkit-scrollbar-track { background: transparent; }
  #chat-history::-webkit-scrollbar-thumb { background: #d4d0f5; border-radius: 4px; }

  .timestamp {
    text-align: center;
    font-size: 11px;
    color: #a0a0b0;
    margin: 2px 0 4px;
  }

  .bot-row { display: flex; align-items: flex-end; gap: 8px; }

  .bav {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #EEEDFE;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .bav svg { width: 15px; height: 15px; }

  .user-row { display: flex; justify-content: flex-end; }

  .bubble {
    max-width: 74%;
    padding: 11px 15px;
    font-size: 14px;
    line-height: 1.65;
    border-radius: 16px;
    word-break: break-word;
  }

  .bot-bubble {
    background: #ffffff;
    border: 1px solid #ede9ff;
    color: #1a1825;
    border-bottom-left-radius: 4px;
  }

  .user-bubble {
    background: #534AB7;
    color: #ffffff;
    border-bottom-right-radius: 4px;
  }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    padding-left: 36px;
    margin-top: 2px;
  }

  .chip {
    font-size: 12.5px;
    padding: 6px 13px;
    border-radius: 20px;
    border: 1px solid #c8c3f0;
    background: #fff;
    color: #534AB7;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s, border-color 0.15s;
  }

  .chip:hover { background: #EEEDFE; border-color: #AFA9EC; }

  .typing-row { display: flex; align-items: flex-end; gap: 8px; }

  .typing-bubble {
    background: #ffffff;
    border: 1px solid #ede9ff;
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    padding: 12px 15px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .typing-bubble span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #AFA9EC;
    animation: blink 1.2s infinite;
  }

  .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
  .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.25; }
    40%           { opacity: 1; }
  }

  .footer {
    padding: 12px 16px 10px;
    border-top: 1px solid #f0eeff;
    background: #fff;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .input-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 8px;
    background: #f9f8ff;
    border: 1px solid #e5e1f7;
    border-radius: 12px;
    padding: 0 14px;
    transition: border-color 0.15s;
  }

  .input-wrap:focus-within { border-color: #AFA9EC; }
  .input-wrap svg { flex-shrink: 0; }

  #user-input {
    flex: 1;
    border: none;
    background: transparent;
    outline: none;
    font-size: 14px;
    color: #1a1825;
    padding: 12px 0;
    font-family: inherit;
  }

  #user-input::placeholder { color: #b8b0d8; }

  #send-btn {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    border: none;
    background: #534AB7;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
  }

  #send-btn:hover  { background: #3C3489; }
  #send-btn:active { transform: scale(0.95); }
  #send-btn:disabled { background: #AFA9EC; cursor: not-allowed; }
  #send-btn svg { width: 16px; height: 16px; }

  .footer-note {
    font-size: 10.5px;
    color: #b0a8d4;
    text-align: center;
    padding: 0 16px 12px;
    background: #fff;
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="hav">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M12 3C9.24 3 7 5.24 7 8c0 1.85 1 3.47 2.5 4.37V14h5v-1.63C16 11.47 17 9.85 17 8c0-2.76-2.24-5-5-5z" fill="white"/>
        <path d="M9 19h6v-1H9v1zm0 2h6v-1H9v1z" fill="rgba(255,255,255,0.55)"/>
      </svg>
    </div>
    <div class="hinfo">
      <div class="hname">Lica</div>
      <div class="hstatus"><span class="dot"></span><span>Online — always here for you</span></div>
    </div>
    <div class="hbadge">Mental Health AI</div>
  </div>

  <div id="chat-history">
    <div class="timestamp">Today</div>
    <div class="bot-row">
      <div class="bav">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M12 3C9.24 3 7 5.24 7 8c0 1.85 1 3.47 2.5 4.37V14h5v-1.63C16 11.47 17 9.85 17 8c0-2.76-2.24-5-5-5z" fill="#534AB7"/>
        </svg>
      </div>
      <div class="bubble bot-bubble">Hi there! I'm <strong>Lica</strong>, your mental wellness companion. I'm here to listen without judgment. How are you feeling today?</div>
    </div>
    <div class="chips" id="quick-chips">
      <button class="chip" onclick="sendQuick('I\'m feeling anxious')">Feeling anxious</button>
      <button class="chip" onclick="sendQuick('I need someone to talk to')">Need to talk</button>
    </div>
  </div>

  <div class="footer">
    <div class="input-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z" fill="#AFA9EC"/>
      </svg>
      <input type="text" id="user-input" placeholder="Share what's on your mind…" autocomplete="off"/>
    </div>
    <button id="send-btn" onclick="handleSend()">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" fill="white"/>
      </svg>
    </button>
  </div>
  <div class="footer-note">Lica is an AI and not a substitute for professional mental health care.</div>

</div>
<script>
  const chatHistory = document.getElementById('chat-history');
  const userInput   = document.getElementById('user-input');
  const sendBtn     = document.getElementById('send-btn');

  function botIcon() {
    return `<div class="bav"><svg viewBox="0 0 24 24" fill="none"><path d="M12 3C9.24 3 7 5.24 7 8c0 1.85 1 3.47 2.5 4.37V14h5v-1.63C16 11.47 17 9.85 17 8c0-2.76-2.24-5-5-5z" fill="#534AB7"/></svg></div>`;
  }

  function escHtml(t) {
    const d = document.createElement('div');
    d.textContent = t;
    return d.innerHTML;
  }

  function addUserMsg(text) {
    const row = document.createElement('div');
    row.className = 'user-row';
    row.innerHTML = `<div class="bubble user-bubble">${escHtml(text)}</div>`;
    chatHistory.appendChild(row);
    chatHistory.scrollTop = chatHistory.scrollHeight;
  }

  function addBotMsg(text) {
    const row = document.createElement('div');
    row.className = 'bot-row';
    row.innerHTML = botIcon() + `<div class="bubble bot-bubble">${escHtml(text)}</div>`;
    chatHistory.appendChild(row);
    chatHistory.scrollTop = chatHistory.scrollHeight;
  }

  function showTyping() {
    const row = document.createElement('div');
    row.id = 'typing';
    row.className = 'typing-row';
    row.innerHTML = botIcon() + `<div class="typing-bubble"><span></span><span></span><span></span></div>`;
    chatHistory.appendChild(row);
    chatHistory.scrollTop = chatHistory.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
  }

  function removeChips() {
    const chips = document.getElementById('quick-chips');
    if (chips) chips.remove();
  }

  async function sendMessage(text) {
    if (!text.trim()) return;
    removeChips();
    addUserMsg(text);
    sendBtn.disabled = true;
    showTyping();

    try {
      const res  = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userInput: text }),
      });
      const data = await res.json();
      hideTyping();
      addBotMsg(data.response || "I'm sorry, something went wrong. Please try again.");
    } catch (err) {
      hideTyping();
      addBotMsg("I'm having trouble connecting right now. Please check your connection and try again.");
      console.error('Chat error:', err);
    } finally {
      sendBtn.disabled = false;
      userInput.focus();
    }
  }

  function handleSend() {
    const text = userInput.value.trim();
    if (!text) return;
    userInput.value = '';
    sendMessage(text);
  }

  function sendQuick(text) {
    userInput.value = '';
    sendMessage(text);
  }

  userInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  });
</script>
</body>
</html>
